{{- /* Mermaid Support for PaperMod - Head */ -}}
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({ startOnLoad: true });
</script>

{{- /* UX Enhancements */ -}}
<script>
document.addEventListener('DOMContentLoaded', function() {
  // ========================================
  // 1. 阅读进度条
  // ========================================
  const progressBar = document.createElement('div');
  progressBar.className = 'reading-progress';
  document.body.prepend(progressBar);

  // ========================================
  // 2. TOC 当前章节高亮 + 智能停止
  // ========================================
  const toc = document.querySelector('.toc');
  const tocLinks = document.querySelectorAll('.toc a');
  const article = document.querySelector('.post-content');
  
  // 获取所有标题元素
  const headings = article ? article.querySelectorAll('h1[id], h2[id], h3[id], h4[id], h5[id], h6[id]') : [];
  
  // 创建 Intersection Observer 监听标题
  if (headings.length > 0 && tocLinks.length > 0) {
    const observerOptions = {
      root: null,
      rootMargin: '-80px 0px -70% 0px',
      threshold: 0
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          // 移除所有 active 类
          tocLinks.forEach(link => link.classList.remove('active'));
          
          // 找到对应的 TOC 链接并高亮
          // Note: TOC hrefs are URL-encoded, heading IDs are decoded
          const id = entry.target.getAttribute('id');
          // 遍历所有 TOC 链接，解码后比较
          tocLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href) {
              const decodedHref = decodeURIComponent(href.slice(1)); // 移除 # 并解码
              if (decodedHref === id) {
                link.classList.add('active');
              }
            }
          });
        }
      });
    }, observerOptions);

    headings.forEach(heading => observer.observe(heading));
  }

  // ========================================
  // 3. 滚动事件处理
  // ========================================
  let ticking = false;
  
  window.addEventListener('scroll', function() {
    if (!ticking) {
      window.requestAnimationFrame(function() {
        // 更新进度条
        const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
        const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
        progressBar.style.width = progress + '%';

        ticking = false;
      });
      ticking = true;
    }
  });
});
</script>
